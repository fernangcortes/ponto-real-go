<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Box/Container -->
  <rect x="80" y="180" width="352" height="280" rx="32" ry="32" fill="none" stroke="url(#accent)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Document sticking out -->
  <path d="M200 200 L200 80 L340 80 L370 110 L370 200" fill="none" stroke="url(#accent)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Document fold -->
  <path d="M340 80 L340 110 L370 110" fill="none" stroke="url(#accent)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Document lines -->
  <line x1="240" y1="120" x2="320" y2="120" stroke="url(#accent)" stroke-width="16" stroke-linecap="round"/>
  <line x1="240" y1="152" x2="310" y2="152" stroke="url(#accent)" stroke-width="16" stroke-linecap="round"/>
  <!-- Clock circle -->
  <circle cx="256" cy="340" r="90" fill="url(#accent)"/>
  <!-- Clock face -->
  <circle cx="256" cy="340" r="70" fill="#1a1a2e"/>
  <!-- Clock hands -->
  <line x1="256" y1="340" x2="256" y2="295" stroke="#4ade80" stroke-width="10" stroke-linecap="round"/>
  <line x1="256" y1="340" x2="290" y2="340" stroke="#4ade80" stroke-width="8" stroke-linecap="round"/>
  <!-- Clock center dot -->
  <circle cx="256" cy="340" r="6" fill="#4ade80"/>
</svg>
